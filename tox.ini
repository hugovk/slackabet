[tox]
requires =
    tox>=4.32
env_list =
    lint
    mypy
    py{310-315}

[testenv]
extras =
    tests
pass_env =
    FORCE_COLOR
set_env =
    COVERAGE_CORE = sysmon
commands =
    {envpython} -m pytest \
      --cov slackabet \
      --cov tests \
      --cov-report html \
      --cov-report term \
      --cov-report xml \
      {posargs}
    slackabet --version
    slackabet --help
    slackabet abcdef
    sb --version
    sb --help
    sb uvwxyz

[testenv:lint]
skip_install = true
deps =
    prek
pass_env =
    PREK_COLOR
commands =
    prek run --all-files --show-diff-on-failure

[testenv:mypy]
deps =
    -r requirements-mypy.txt
commands =
    mypy . {posargs}
